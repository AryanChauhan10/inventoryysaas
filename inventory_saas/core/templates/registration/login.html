{% extends 'core/base.html' %}

{% block content %}

<div class="auth-container">
    <form method="POST" class="auth-form">
        {% csrf_token %}
        
        <h2>Login</h2>

        {{ form.as_p }}

        <button type="submit">Login</button>

        <p>Don't have an account? 
            <a href="/accounts/register/">Register</a>
        </p>
    </form>
</div>

{% endblock %}
